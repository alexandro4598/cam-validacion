<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Cámara</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .header {
            background: #1e293b;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin: 0 0 10px 0;
        }

        .card p {
            margin: 0;
            opacity: 0.8;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #22c55e;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #16a34a;
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div class="header">
        Validación de Cámara
    </div>

    <div class="container">

        <div class="card">
            <h2>Tomas</h2>
            <p>Captura frontal del usuario</p>
        </div>

        <div class="card">
            <h2>Tomas</h2>
            <p>Captura de identificación</p>
        </div>

        <div class="card">
            <h2>Tomas</h2>
            <p>Validación biométrica</p>
        </div>

        <button class="btn" onclick="alert('Simulación de apertura de cámara 📷')">
            Iniciar Validación
        </button>

    </div>

    <div class="footer">
        Sistema de validación © 2026
    </div>

</body>
</html>
